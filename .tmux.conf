# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "raoulwo/tmux"

# Inactive window background color
set -g @catppuccin_window_default_background "#282828"
# Current window background color
set -g @catppuccin_window_current_background "#3c3836"
# Pane border color
set -g @catppuccin_pane_border_style "fg=#282828"
# Active pane border color
set -g @catppuccin_pane_active_border_style "fg=#282828"

# Reload configuration using `r`
bind -r r source-file ~/.tmux.conf

# Enable the mouse
set -g mouse on

# Set terminal colors
set-option -g default-terminal "screen-256color"

# Set delay between prefix and command
set -s escape-time 0

# Start windows with index 1
set -g base-index 1
# Start panes with index 1
setw -g pane-base-index 1
# Renumber the windows should a window be closed
set -g renumber-windows on

# Cycle through windows
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+

# Navigate panes using vi motion
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes using vi motions
bind -r H resize-pane -L 1
bind -r J resize-pane -D 1
bind -r K resize-pane -U 1
bind -r L resize-pane -R 1

# Decrease the repeat time
set -g repeat-time 250

# Bind `&` to kill window including panes
bind-key & kill-window

# Enable vi mode
set -g mode-keys vi
set -g status-keys vi

# Copy mode keybindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Status bar positioning
set -g status-position top

# Run Tmux Plugin Manager
run "~/.tmux/plugins/tpm/tpm"
